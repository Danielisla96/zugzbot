name: ssd-orchestrated
version: 1
description: SSD Orchestrated Workflow (Orchestrator + Subagents)
artifacts:
  - id: proposal
    generates: proposal.md
    description: High-level description of the change, its motivation, and scope
    template: proposal.md
    requires: []
  - id: specs
    generates: specs/**/*.md
    description: Detailed specifications with requirements and scenarios
    template: specs/spec.md
    requires: [proposal]
  - id: orchestrator_architecture
    generates: orchestrator_architecture.md
    description: Architectural plan detailing which subagents will be used and their responsibilities
    template: orchestrator_architecture.md
    requires: [specs]
  - id: orchestrator_tasks
    generates: orchestrator_tasks.md
    description: Master checklist of tasks to be delegated to subagents
    template: orchestrator_tasks.md
    requires: [orchestrator_architecture]
